# docker-compose.yml (at project root)

services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./.env
    volumes:
      # Mount the local backend directory into the container for hot-reloading
      - ./backend:/app
      # Use a named volume to persist user uploads
      - backend_uploads:/app/uploads
    restart: unless-stopped

# Correctly defines the named volume, resolving the original YAML syntax error.
# The trailing colon (:) has been replaced with the correct syntax.
volumes:
  backend_uploads: {}